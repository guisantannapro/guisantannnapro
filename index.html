<!doctype html>
<html lang="pt-BR" style="background:#0a0a0a;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guilherme Sant'Anna | Consultoria Online Fitness</title>
    <meta name="description" content="Consultoria online personalizada de transformação física com Guilherme Sant'Anna. Mais de 20 anos de experiência no fisiculturismo. Ganhe massa, perca gordura e alcance resultados reais.">
    <meta name="theme-color" content="#0a0a0a">
    <style>
      html,body{margin:0;padding:0;background:#0a0a0a;min-height:100vh;overflow:auto}
      #root{min-height:100vh;background:#0a0a0a}
      .gs-splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity 0.3s ease-out}
      .gs-splash.hidden{opacity:0;pointer-events:none}
      .gs-splash-logo{width:80px;height:80px;margin-bottom:20px;animation:gs-pulse 2s ease-in-out infinite}
      .gs-loader{width:2rem;height:2rem;border:2px solid #b8860b;border-top-color:transparent;border-radius:50%;animation:gs-spin .8s linear infinite}
      @keyframes gs-spin{to{transform:rotate(360deg)}}
      @keyframes gs-pulse{0%,100%{opacity:1}50%{opacity:0.7}}
    </style>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1LTJWH6P9C"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag( ){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1LTJWH6P9C');
    </script>
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js' );
      fbq('init', '874749858956955');
      fbq('track', 'PageView');
    </script>
  </head>
  <body>
    <div id="gs-splash" class="gs-splash">
      <div class="gs-splash-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#b8860b" stroke-width="2"/>
          <text x="50" y="60" text-anchor="middle" font-size="40" font-weight="bold" fill="#b8860b" font-family="Arial, sans-serif">GS</text>
        </svg>
      </div>
      <div class="gs-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const originalRoot = document.getElementById('root' );
      const observer = new MutationObserver(() => {
        if (originalRoot && originalRoot.children.length > 0) {
          const splash = document.getElementById('gs-splash');
          if (splash) splash.classList.add('hidden');
          observer.disconnect();
        }
      });
      if (originalRoot) observer.observe(originalRoot, { childList: true, subtree: true });
      setTimeout(() => {
        const splash = document.getElementById('gs-splash');
        if (splash) splash.classList.add('hidden');
      }, 3000);
    </script>
  </body>
</html>
